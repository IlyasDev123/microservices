services:

  auth-app:
    build:
      context: ./backend/auth-service
    container_name: auth-app
    working_dir: /var/www
    volumes:
      - ./backend/auth-service:/var/www
    networks:
      - micro

  auth-nginx:
    image: nginx:1.28-alpine
    container_name: auth-nginx
    ports:
      - "8001:80"
    volumes:
      - ./backend/auth-service:/var/www
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-app
    networks:
      - micro

  user-app:
    build:
      context: ./backend/user-service
    container_name: user-app
    working_dir: /var/www
    volumes:
      - ./backend/user-service:/var/www
    networks:
      - micro

  user-nginx:
    image: nginx:1.28-alpine
    container_name: user-nginx
    ports:
      - "8002:80"
    volumes:
      - ./backend/user-service:/var/www
      - ./backend/docker/nginx/user-service.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-app
    networks:
      - micro

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - micro

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 256M
    ports:
      - "8080:80"
    networks:
      - micro

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - AUTH_SERVICE_URL=http://auth-nginx
      - USER_SERVICE_URL=http://user-nginx
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - auth-nginx
      - user-nginx
    networks:
      - micro

networks:
  micro:

volumes:
  mysql-data:
  frontend_node_modules:
  frontend_next:
