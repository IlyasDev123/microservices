services:

  auth-app:
    build:
      context: ./auth-service
    container_name: auth-app
    working_dir: /var/www
    volumes:
      - ./auth-service:/var/www
    networks:
      - micro

  auth-nginx:
    image: nginx:1.28-alpine
    container_name: auth-nginx
    ports:
      - "8001:80"
    volumes:
      - ./auth-service:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-app
    networks:
      - micro

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - micro

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 256M
    ports:
      - "8080:80"
    networks:
      - micro

networks:
  micro:

volumes:
  mysql-data:
